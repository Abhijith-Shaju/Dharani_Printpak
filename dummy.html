<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infinity Animation</title>
<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #f0f0f0;
    }

    .container {
        position: relative;
        width: 300px;
        height: 150px;
    }

    /* The moving object */
    .ball {
        position: absolute;
        width: 30px;
        height: 30px;
        background-color: #ff4757;
        border-radius: 50%;
        top: 50%;
        left: 50%;
        margin-top: -15px; /* Half of height */
        margin-left: -15px; /* Half of width */
        
        /* Apply the animation */
        animation: infinity-move 4s linear infinite;
    }

    /* Keyframes for the figure-eight movement */
    @keyframes infinity-move {
        0% { transform: translate(0, 0); }
        25% { transform: translate(75px, -50px); }
        50% { transform: translate(0, 0); }
        75% { transform: translate(-75px, 50px); }
        100% { transform: translate(0, 0); }
    }
</style>
</head>
<body>
    <div class="container">
        <div class="ball"></div>
    </div>
</body>
</html>
